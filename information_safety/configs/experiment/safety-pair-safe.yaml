# @package _global_

defaults:
  - override /algorithm: attack_with_strategy
  - override /algorithm/dataset_handler: safety_pair
  - override /algorithm/model: llama3_8b_instruct
  - override /algorithm/strategy: lora
  - override /trainer: default

name: safety-pair-safe

algorithm:
  dataset_handler:
    include_refusals: true
  strategy:
    lr: 0.0001
    r: 16
    lora_alpha: 16
    lora_dropout: 0.0

trainer:
  max_epochs: 3
  callbacks:
    model_checkpoint:
      dirpath: /network/scratch/b/brownet/information-safety/checkpoints/safety-pair-safe/
